<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2252"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Franja bandera Colombia arriba -->
  <rect x="0" y="0" width="1200" height="12" fill="#fcd116"/>
  <rect x="0" y="12" width="1200" height="6" fill="#003087"/>
  <rect x="0" y="18" width="1200" height="6" fill="#ce1126"/>

  <!-- Título principal -->
  <text x="72" y="108" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-0.5">Comparativo de Indicadores</text>
  <text x="72" y="165" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-0.5">de Gobierno — Colombia</text>

  <!-- Línea acento amarillo -->
  <rect x="72" y="182" width="200" height="4" rx="2" fill="#fcd116"/>

  <!-- Subtítulo -->
  <text x="72" y="228" font-family="Arial, sans-serif" font-size="23" fill="#93b4e8">7 presidentes · 30+ indicadores · 1990–2026</text>
  <text x="72" y="260" font-family="Arial, sans-serif" font-size="18" fill="#5a7fac">Datos verificados: DANE · BanRep · INMLCF · UNODC</text>

  <!-- Área del gráfico de barras -->
  <rect x="72" y="290" width="760" height="250" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="92" y="318" font-family="Arial, sans-serif" font-size="13" fill="#7ba7f0">Homicidios por 100.000 hab. (promedio del mandato)</text>

  <!-- Línea base -->
  <line x1="92" y1="496" x2="812" y2="496" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Barras — escala: 77.6 = 148px de alto máximo -->
  <!-- Gaviria 77.6 -->
  <rect x="100" y="348" width="76" height="148" rx="3" fill="#ef4444" opacity="0.9"/>
  <text x="138" y="344" font-family="Arial, sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">77.6</text>
  <text x="138" y="512" font-family="Arial, sans-serif" font-size="11" fill="#8ba3c4" text-anchor="middle">Gaviria</text>
  <text x="138" y="524" font-family="Arial, sans-serif" font-size="10" fill="#5a7899" text-anchor="middle">1990–94</text>

  <!-- Samper 62.1 -->
  <rect x="198" y="377" width="76" height="119" rx="3" fill="#f97316" opacity="0.9"/>
  <text x="236" y="372" font-family="Arial, sans-serif" font-size="12" fill="#fdba74" text-anchor="middle">62.1</text>
  <text x="236" y="512" font-family="Arial, sans-serif" font-size="11" fill="#8ba3c4" text-anchor="middle">Samper</text>
  <text x="236" y="524" font-family="Arial, sans-serif" font-size="10" fill="#5a7899" text-anchor="middle">1994–98</text>

  <!-- Pastrana 63.5 -->
  <rect x="296" y="375" width="76" height="121" rx="3" fill="#f97316" opacity="0.9"/>
  <text x="334" y="370" font-family="Arial, sans-serif" font-size="12" fill="#fdba74" text-anchor="middle">63.5</text>
  <text x="334" y="512" font-family="Arial, sans-serif" font-size="11" fill="#8ba3c4" text-anchor="middle">Pastrana</text>
  <text x="334" y="524" font-family="Arial, sans-serif" font-size="10" fill="#5a7899" text-anchor="middle">1998–02</text>

  <!-- Uribe 38.6 -->
  <rect x="394" y="422" width="76" height="74" rx="3" fill="#eab308" opacity="0.9"/>
  <text x="432" y="417" font-family="Arial, sans-serif" font-size="12" fill="#fef08a" text-anchor="middle">38.6</text>
  <text x="432" y="512" font-family="Arial, sans-serif" font-size="11" fill="#8ba3c4" text-anchor="middle">Uribe</text>
  <text x="432" y="524" font-family="Arial, sans-serif" font-size="10" fill="#5a7899" text-anchor="middle">2002–10</text>

  <!-- Santos 27.5 -->
  <rect x="492" y="443" width="76" height="53" rx="3" fill="#22c55e" opacity="0.9"/>
  <text x="530" y="438" font-family="Arial, sans-serif" font-size="12" fill="#86efac" text-anchor="middle">27.5</text>
  <text x="530" y="512" font-family="Arial, sans-serif" font-size="11" fill="#8ba3c4" text-anchor="middle">Santos</text>
  <text x="530" y="524" font-family="Arial, sans-serif" font-size="10" fill="#5a7899" text-anchor="middle">2010–18</text>

  <!-- Duque 26.4 -->
  <rect x="590" y="445" width="76" height="51" rx="3" fill="#22c55e" opacity="0.9"/>
  <text x="628" y="440" font-family="Arial, sans-serif" font-size="12" fill="#86efac" text-anchor="middle">26.4</text>
  <text x="628" y="512" font-family="Arial, sans-serif" font-size="11" fill="#8ba3c4" text-anchor="middle">Duque</text>
  <text x="628" y="524" font-family="Arial, sans-serif" font-size="10" fill="#5a7899" text-anchor="middle">2018–22</text>

  <!-- Petro 27.5 -->
  <rect x="688" y="443" width="76" height="53" rx="3" fill="#22c55e" opacity="0.9"/>
  <text x="726" y="438" font-family="Arial, sans-serif" font-size="12" fill="#86efac" text-anchor="middle">27.5</text>
  <text x="726" y="512" font-family="Arial, sans-serif" font-size="11" fill="#8ba3c4" text-anchor="middle">Petro</text>
  <text x="726" y="524" font-family="Arial, sans-serif" font-size="10" fill="#5a7899" text-anchor="middle">2022–26</text>

  <!-- Panel derecho — escudo Colombia -->
  <g transform="translate(900, 175)">
    <clipPath id="sc">
      <path d="M115 18 L18 52 L18 128 C18 182 66 222 115 238 C164 222 212 182 212 128 L212 52 Z"/>
    </clipPath>
    <g clip-path="url(#sc)">
      <rect x="18" y="18" width="194" height="88" fill="#fcd116"/>
      <rect x="18" y="106" width="194" height="72" fill="#003087"/>
      <rect x="18" y="178" width="194" height="78" fill="#ce1126"/>
    </g>
    <path d="M115 18 L18 52 L18 128 C18 182 66 222 115 238 C164 222 212 182 212 128 L212 52 Z" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  </g>

  <!-- Stats debajo del escudo -->
  <text x="960" y="470" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white" text-anchor="middle">30+</text>
  <text x="960" y="498" font-family="Arial, sans-serif" font-size="14" fill="#5a7fac" text-anchor="middle">indicadores</text>

  <text x="1100" y="470" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white" text-anchor="middle">35</text>
  <text x="1100" y="498" font-family="Arial, sans-serif" font-size="14" fill="#5a7fac" text-anchor="middle">años de datos</text>

  <!-- URL -->
  <text x="72" y="595" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#4a7fd4">votacioncolombia.com</text>
</svg>
